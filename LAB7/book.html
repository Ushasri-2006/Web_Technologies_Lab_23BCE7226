<!DOCTYPE html>
<html>
<head>
<title>Online Book Finder</title>
</head>

<body>

<h2>Online Book Finder</h2>

<input type="text" id="searchTitle" placeholder="Search book title">
<button onclick="searchBooks()">Search</button>

<br><br>

<button onclick="filterCategory()">Programming Books</button>
<button onclick="sortPrice()">Sort by Price</button>
<button onclick="sortRating()">Sort by Rating</button>
<button onclick="topBooks()">Top Rated Books</button>

<br><br>

<button onclick="loadMore()">Load More</button>

<ul id="bookList"></ul>

<script>

let page = 1;

function displayBooks(books){

let list = document.getElementById("bookList");

list.innerHTML="";

books.forEach(book=>{

let li = document.createElement("li");

li.innerHTML =
book.title + " | " +
book.author + " | ₹" +
book.price + " | Rating: " +
book.rating;

list.appendChild(li);

});

}


function searchBooks(){

let title = document.getElementById("searchTitle").value;

fetch("http://localhost:3000/books/search?title="+title)
.then(res=>res.json())
.then(data=>displayBooks(data));

}


function filterCategory(){

fetch("http://localhost:3000/books/category/programming")
.then(res=>res.json())
.then(data=>displayBooks(data));

}


function sortPrice(){

fetch("http://localhost:3000/books/sort/price")
.then(res=>res.json())
.then(data=>displayBooks(data));

}


function sortRating(){

fetch("http://localhost:3000/books/sort/rating")
.then(res=>res.json())
.then(data=>displayBooks(data));

}


function topBooks(){

fetch("http://localhost:3000/books/top")
.then(res=>res.json())
.then(data=>displayBooks(data));

}


function loadMore(){

fetch("http://localhost:3000/books?page="+page)
.then(res=>res.json())
.then(data=>displayBooks(data));

page++;

}

</script>

</body>
</html>
